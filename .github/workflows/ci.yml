name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node -c index.js
      - run: node -c lib/server.js
      - run: node -c lib/routes.js
      - run: node -c lib/app-state.js
      - run: node -c lib/auth.js
      - run: node -c lib/config.js
      - run: node -c lib/router.js
      - run: node -c lib/logger.js
      - run: node -c lib/notifications.js
      - run: node -c lib/rrd.js
      - run: node -c lib/solarman.js
      - run: node -c lib/tuya-sign.js
      - run: node -c lib/crypto.js
      - run: node -c lib/crc16.js
      - run: node -c lib/rate-limit.js
      - run: node -c public/app.js
      - run: node -c public/login.js

